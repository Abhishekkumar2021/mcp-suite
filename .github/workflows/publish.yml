name: Publish to npm

# Publishes a server to npm when a GitHub Release is published.
#
# Auth uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret required.
# One-time setup per package on npmjs.com:
#   Package settings → Publishing access → "Trusted Publisher" → GitHub Actions
#   org/repo: Abhishekkumar2021/mcp-suite, workflow: publish.yml
#
# Release tag convention: "<package>-v<version>", e.g. "notes-v0.1.0".
# (A plain "v0.1.0" tag defaults to publishing the notes server.)

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v5

      - name: Determine target server from release tag
        id: target
        run: |
          tag="${GITHUB_REF_NAME}"
          # "<server>-v<version>" -> "<server>"; fall back to "notes".
          if [[ "$tag" == *-v* ]]; then
            server="${tag%-v*}"
          else
            server="notes"
          fi
          if [[ ! -d "servers/$server" ]]; then
            echo "::error::No server directory at servers/$server (from tag '$tag')"
            exit 1
          fi
          echo "server=$server" >> "$GITHUB_OUTPUT"
          echo "Publishing servers/$server"

      # NOTE: do NOT set `registry-url` here. It makes setup-node write an
      # .npmrc with `_authToken=${NODE_AUTH_TOKEN}` + always-auth, which makes
      # npm attempt token auth and skip the OIDC trusted-publisher exchange,
      # causing a 404 on publish. Without it, npm 11.5.1+ uses OIDC correctly.
      - name: Use Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm

      # Trusted Publishing (OIDC) requires a recent npm.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -w "servers/${{ steps.target.outputs.server }}"

      - name: Publish with provenance
        run: npm publish -w "servers/${{ steps.target.outputs.server }}" --provenance --access public

      # Publish to the official MCP registry (https://registry.modelcontextprotocol.io).
      # Auth uses GitHub Actions OIDC (no secret) and works for the
      # io.github.<owner>/* namespace because this workflow runs in that owner's repo.
      # Skipped automatically for any server that doesn't ship a server.json.
      - name: Publish to MCP registry
        working-directory: servers/${{ steps.target.outputs.server }}
        run: |
          if [ ! -f server.json ]; then
            echo "No server.json for ${{ steps.target.outputs.server }} — skipping registry publish."
            exit 0
          fi
          # Keep server.json's version in lockstep with the package version (the
          # release we just published), so contributors only bump package.json.
          ver=$(node -p "require('./package.json').version")
          tmp=$(mktemp)
          jq --arg v "$ver" '.version = $v | .packages[0].version = $v' server.json > "$tmp" && mv "$tmp" server.json

          # Install the mcp-publisher CLI (Go binary) for this runner's OS/arch.
          os=$(uname -s | tr '[:upper:]' '[:lower:]')
          arch=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_${os}_${arch}.tar.gz" | tar xz mcp-publisher

          ./mcp-publisher validate
          ./mcp-publisher login github-oidc
          # npm may take a few seconds to expose the just-published version that the
          # registry validates against — retry briefly.
          for attempt in 1 2 3 4 5; do
            if ./mcp-publisher publish; then
              echo "Published to MCP registry."; exit 0
            fi
            echo "Registry publish attempt $attempt failed; retrying in 15s…"; sleep 15
          done
          echo "::error::MCP registry publish failed after retries"; exit 1
